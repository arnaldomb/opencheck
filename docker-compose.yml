services:
  # ── Infraestrutura ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: opencheck_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opencheck
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: opencheck_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Migrate + Seed (one-shot) ─────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: packages/database/Dockerfile.migrate
    container_name: opencheck_migrate
    restart: no
    environment:
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/opencheck
      SUPERADMIN_EMAIL: admin@opencheck.com.br
      SUPERADMIN_SENHA: Admin@2024!
      ENCRYPTION_KEY: exactly-32-chars-for-aes256key!
    depends_on:
      postgres:
        condition: service_healthy

  # ── API Fastify ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: opencheck_api
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      APP_URL: https://opencheck.ggtronic.com.br
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/opencheck
      REDIS_URL: redis://redis:6379
      JWT_SECRET: min-32-chars-here-xxxxxxxxxxxxxxx
      JWT_REFRESH_SECRET: min-32-chars-here-yyyyyyy
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      ENCRYPTION_KEY: exactly-32-chars-for-aes256key!
      EZVIZ_APP_KEY: ${EZVIZ_APP_KEY}
      EZVIZ_APP_SECRET: ${EZVIZ_APP_SECRET}
      EZVIZ_REGION: ${EZVIZ_REGION:-br}
      EZVIZ_AUTH_URL: ${EZVIZ_AUTH_URL:-https://open.ezvizlife.com}
      EZVIZ_API_URL: ${EZVIZ_API_URL:-https://isaopen.ezvizlife.com}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: snapshots
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

  # ── Frontend Next.js ──────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.opencheck.ggtronic.com.br
    container_name: opencheck_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Ferramentas de dev ────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: opencheck_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@opencheck.com.br
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: opencheck_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: opencheck_redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: opencheck_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    network_mode: host
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
