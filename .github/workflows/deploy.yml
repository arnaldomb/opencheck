name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: arnaldomb

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push — migrate
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/database/Dockerfile.migrate
          push: true
          tags: ghcr.io/${{ env.OWNER }}/opencheck-migrate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push — api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/opencheck-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push — web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/opencheck-web:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.opencheck.ggtronic.com.br
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy na VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /docker/opencheck
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
