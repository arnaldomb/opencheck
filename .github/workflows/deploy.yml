name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: arnaldomb

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.OWNER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/alerta-vigia-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/alerta-vigia-web:latest
          build-args: |
            NEXT_PUBLIC_API_URL=https://vigia-api.ctrlsafe.com.br
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Migrate
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/database/Dockerfile.migrate
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/alerta-vigia-migrate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: SSH & deploy
        uses: appleboy/ssh-action@v1
        with:
          host: 193.203.182.2
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/alerta-vigia
            docker compose -f docker-compose.vps.yml pull
            docker compose -f docker-compose.vps.yml up -d --remove-orphans
            docker image prune -f
