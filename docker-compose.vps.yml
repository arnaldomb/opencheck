services:
  postgres:
    image: postgres:16-alpine
    container_name: opencheck_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opencheck
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opencheck_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  migrate:
    image: ghcr.io/arnaldomb/opencheck-migrate:latest
    restart: "no"
    environment:
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/opencheck
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_SENHA: ${SUPERADMIN_SENHA}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  api:
    image: ghcr.io/arnaldomb/opencheck-api:latest
    container_name: opencheck_api
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
      NODE_ENV: ${NODE_ENV}
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/opencheck
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ASAAS_API_KEY: ${ASAAS_API_KEY}
      ASAAS_SANDBOX: ${ASAAS_SANDBOX}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN}
      CTRLSAFE_API_URL: ${CTRLSAFE_API_URL}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.opencheck-api.rule=Host(`api.opencheck.ggtronic.com.br`)"
      - "traefik.http.routers.opencheck-api.entrypoints=websecure"
      - "traefik.http.routers.opencheck-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.opencheck-api.loadbalancer.server.port=3001"

  web:
    image: ghcr.io/arnaldomb/opencheck-web:latest
    container_name: opencheck_web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.opencheck-web.rule=Host(`opencheck.ggtronic.com.br`)"
      - "traefik.http.routers.opencheck-web.entrypoints=websecure"
      - "traefik.http.routers.opencheck-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.opencheck-web.loadbalancer.server.port=3000"

networks:
  internal:
    driver: bridge
  proxy:
    external: true

volumes:
  postgres_data:
  redis_data:
