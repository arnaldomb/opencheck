services:
  # ── Infraestrutura ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: opencheck_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opencheck
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: opencheck_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Migrate + Seed (one-shot) ─────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: packages/database/Dockerfile.migrate
    container_name: opencheck_migrate
    restart: "no"
    environment:
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/opencheck
      SUPERADMIN_EMAIL: admin@opencheck.com.br
      SUPERADMIN_SENHA: Admin@2024!
      ENCRYPTION_KEY: dev-encryption-key-32chars-here!
    depends_on:
      postgres:
        condition: service_healthy

  # ── API Fastify ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: opencheck_api
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      APP_URL: http://localhost:3000
      API_URL: http://localhost:3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/opencheck
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-min-32-chars-here-xxxxx
      JWT_REFRESH_SECRET: dev-jwt-refresh-secret-min-32-chars-yy
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      ENCRYPTION_KEY: dev-encryption-key-32chars-here!
      # Pagamentos — sandbox desativado em dev local
      ASAAS_API_KEY: dev_placeholder_key
      ASAAS_SANDBOX: "true"
      ASAAS_WEBHOOK_TOKEN: dev_webhook_token
      # CTRL+SAFE
      CTRLSAFE_API_URL: https://api.ctrlsafe.com.br/api/functions/v1
      # WhatsApp — opcional em dev
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-}
      # E-mail — desativado em dev
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_USER: dev
      SMTP_PASS: dev
      EMAIL_FROM: dev@opencheck.local
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ── Frontend Next.js ──────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: opencheck_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Ferramentas de dev ────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: opencheck_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@opencheck.com.br
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: opencheck_redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
